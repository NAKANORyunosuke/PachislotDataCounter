<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pachislot Data Counter</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main>
    <h1>Pachislot Data Counter</h1>
    <div class="grid">
      <div class="card big"><div class="label">BB</div><div class="value" id="BB">0</div></div>
      <div class="card reg"><div class="label">RB</div><div class="value" id="RB">0</div></div>
      <div class="card in"><div class="label">IN</div><div class="value" id="IN">0</div></div>
      <div class="card out"><div class="label">OUT</div><div class="value" id="OUT">0</div></div>
    </div>
    <p id="status">Connecting...</p>
  </main>
  <script src="/app.js"></script>
</body>
</html>
